name: Claude Code - Real Skill Smoke Test

on:
  workflow_dispatch:

run-name: claude-real-skill-${{ github.run_id }}

permissions:
  contents: write
  pull-requests: write

jobs:
  claude-real-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          use_bedrock: "true"
          github_token: ${{ github.token }}
          show_full_output: true

          claude_args: >-
            --max-turns 20
            --model global.anthropic.claude-sonnet-4-6

          prompt: |
            You are running inside a GitHub Actions CI environment.

            IMPORTANT:
            - You MUST delegate review to a subagent.
            - Make one tiny deterministic repository change.
            - Keep the diff extremely small.
            - Do not delete files.
            - Do not create a PR.
            - Do not create releases.

            Expected flow:
            1. Use the tiny-readme-update skill.
            2. Make a tiny repository improvement.
            3. Launch a subagent to review the change.
            4. Apply any tiny safe review fix if needed.
            5. Summarize:
               - what skill was used
               - what subagent reviewed
               - what files changed

      - name: Show changed files
        shell: bash
        run: |
          set -euo pipefail
          git status --short

      - name: Show git diff
        shell: bash
        run: |
          set -euo pipefail
          git diff --stat
