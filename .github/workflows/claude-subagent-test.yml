name: Claude Subagent README Test

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  claude-edit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          use_bedrock: "true"
          github_token: ${{ github.token }}
          show_full_output: true

          claude_args: >-
            --model global.anthropic.claude-sonnet-4-6

          prompt: |
            Make tiny improvement to README.md.

            Keep the change minimal and safe.

            After editing README.md, use the Agent tool to delegate verification to a subagent.

            The delegated subagent should:
            - inspect the README change
            - verify formatting
            - verify no unrelated files changed
