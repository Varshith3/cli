name: Claude Code EPPE Bug Fix

on:
  workflow_dispatch:
    inputs:
      eppe_ticket:
        description: "EPPE Ticket Number"
        required: true
        type: string

      bug_description:
        description: "Bug description"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  claude-bugfix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Create branch name
        id: branch
        shell: bash
        env:
          EPPE_TICKET: ${{ github.event.inputs.eppe_ticket }}
          BUG_DESCRIPTION: ${{ github.event.inputs.bug_description }}
        run: |
          set -euo pipefail

          TICKET="$(echo "$EPPE_TICKET" | xargs)"

          SLUG="$(echo "$BUG_DESCRIPTION" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-zA-Z0-9]/-/g' \
            | sed 's/-\+/-/g' \
            | sed 's/^-//' \
            | sed 's/-$//' \
            | cut -c1-50)"

          BRANCH_NAME="${TICKET}-${SLUG}"

          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

          echo "Generated branch:"
          echo "$BRANCH_NAME"

      - name: Create git branch
        run: |
          git checkout -b "${{ steps.branch.outputs.branch_name }}"

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          use_bedrock: "true"
          github_token: ${{ github.token }}
          show_full_output: true

          claude_args: >-
            --model global.anthropic.claude-sonnet-4-6
            --dangerously-skip-permissions

          prompt: |
            You are working inside a production repository.

            EPPE Ticket:
            ${{ github.event.inputs.eppe_ticket }}

            Bug Description:
            ${{ github.event.inputs.bug_description }}

            Repository-specific orchestration assets exist under:
            - .ghdp/skills
            - .ghdp/agents

            IMPORTANT:
            You MUST explicitly inspect and use the following custom skill and subagent during this workflow.

            Skill:
            .ghdp/skills/architecture-compliance/SKILL.md

            Subagent:
            .ghdp/agents/architecture-review.json

            Workflow Requirements:

            1. Analyze the repository and identify the root cause.
            2. Implement the bug fix.
            3. Keep changes minimal and production safe.
            4. Update or add tests if necessary.
            5. Avoid unrelated modifications.

            AFTER implementing the fix:

            - Read and apply the architecture-compliance skill.
            - Invoke the architecture-review subagent for validation and review.
            - The architecture-review subagent must:
              - inspect all changed files
              - verify architectural compliance
              - verify repository conventions
              - verify no unrelated changes exist
              - verify tests align with implementation
              - verify the fix matches the EPPE ticket intent

            Also use an additional exploration/review subagent if needed for:
            - repository exploration
            - dependency tracing
            - test verification
            - code review

            Final requirements:
            - commit only validated changes
            - do not modify unrelated files
            - ensure the repository remains build-safe
            - provide concise implementation reasoning in commit message context
            
      - name: Check for changes
        id: changes
        shell: bash
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          git commit -m "fix: ${{ github.event.inputs.eppe_ticket }} automated bug fix"

      - name: Push branch
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git push origin "${{ steps.branch.outputs.branch_name }}"

      - name: Workflow summary
        run: |
          echo "Created branch: ${{ steps.branch.outputs.branch_name }}"
