name: GHDP Agent Policy

on:
  pull_request:
  workflow_dispatch:

jobs:
  repo-ready:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pipx
        run: python -m pip install --upgrade pip pipx

      - name: Install GHDP CLI
        run: pipx install "git+https://github.com/gh-org-data-platform/dp-tools-local-setup.git#subdirectory=platform-cli"

      - name: Verify repo readiness
        run: ghdp repo ready --verify --repo-root .
