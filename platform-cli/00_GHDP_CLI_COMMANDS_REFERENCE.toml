# GHDP_CLI_REFERENCE.toml
# Single-source, IDE/agent-friendly reference for GHDP CLI commands, flags, config keys, and expected errors.
# Keep this file SMALL + factual. Prefer short strings; avoid long prose.
# Update whenever you add/change a command/flag/error.

[meta]
schema_version = "1.0"
cli_name = "ghdp"
repo_path_hint = "dp-tools-local-setup/platform-cli"
notes = "Used by humans + IDE agents (Copilot/Cursor). If you don't know which command to run, start here."

[paths]
config_file = "~/.ghdp/config.json"
usage_log = "~/.ghdp/usage.log"
error_log = "~/.ghdp/errors.log"
state_file = "~/.ghdp/state/state.json"
state_lock = "~/.ghdp/state/state.lock"
release_policy_file = "~/.ghdp/policies/release-policy.managed.json"

[global]
welcome = "Running `ghdp` with no subcommand shows the welcome panel + exits 0."

[global.flags.verbose]
cli = "--verbose/-v"
type = "bool"
default = false
help = "Verbose output (show underlying steps/commands where supported)."

[global.flags.quiet]
cli = "--quiet"
type = "bool"
default = false
help = "Quiet mode (suppress non-essential output)."

[global.flags.json]
cli = "--json"
type = "bool"
default = false
help = "JSON output when supported (doctor/commands etc.)."

[global.flags.non_interactive]
cli = "--non-interactive"
type = "bool"
default = false
env = "GHDP_NON_INTERACTIVE"
help = "Fail instead of prompting; useful in CI/GitHub Actions."

[global.env.GHDP_TELEMETRY]
type = "0|1|true|false"
default = "1"
help = "Overrides telemetry.enabled; env wins over config."

[config_keys."telemetry.enabled"]
type = "bool"
default = true
affects = "usage/error logging via tracked_command + telemetry module."

[config_keys."git.strict_clean"]
type = "bool"
default = true
affects = "requires_clean_git decorator; blocks commands when repo has uncommitted changes."

[config_keys."precommit.mode"]
type = "string"
default = "off"
allowed = ["off", "warn", "enforce"]
affects = "precommit_check decorator."

[config_keys."updates.enabled"]
type = "bool"
default = true
affects = "startup update check hook (best-effort)."

[config_keys."team.selected"]
type = "string"
default = ""
affects = "default team context for team-aware commands when --team is omitted."

[config_keys."claude.athena_workgroup"]
type = "string"
default = ""
affects = "Claude Code bootstrap; stores only Athena workgroups entered interactively during install. Env-derived and AWS-identity-derived values are not persisted to this key."

[config_keys."jenkins.okta_email"]
type = "string"
default = ""
affects = "Jenkins release execution auth. Used for release-management prompts and local Jenkins credential resolution."

[config_keys."jenkins.api_token"]
type = "string"
default = ""
sensitive = true
affects = "Jenkins release execution auth for feature-to-dev / make-release. Stored locally only when the user saves it."

# Feature flags are just config bools; convention: features.<something>.enabled
[feature_flags]
convention = "features.<domain>.<name>.enabled"

# ──────────────────────────────────────────────────────────────────────────────
# Commands
# Each entry is designed to be easy for an IDE agent to pattern-match.
# Use `cli` as the canonical invocation form.
# ──────────────────────────────────────────────────────────────────────────────

[[commands]]
id = "hello"
cli = "ghdp hello"
category = "basic"
tags = ["demo", "smoke"]
summary = "Smoke-test / demo command (prints a greeting)."
flags = [
  { cli="--name/-n", type="string", required=false, default="world", help="Name to greet" },
]
examples = [
  "ghdp hello -n Megha",
]
common_errors = []

[[commands]]
id = "codex"
cli = "ghdp codex [<args>...]"
category = "tools"
tags = ["codex", "passthrough"]
summary = "Pass through arguments directly to codex CLI."
flags = []
examples = [
  "ghdp codex --version",
  "ghdp codex login status",
  "ghdp codex",
]
common_errors = [
  { code="E_CMD_NOT_FOUND", when="codex executable is not available on PATH" },
]

[[commands]]
id = "claude"
cli = "ghdp claude [<args>...]"
category = "tools"
tags = ["claude", "passthrough"]
summary = "Pass through arguments directly to Claude Code CLI."
flags = []
examples = [
  "ghdp claude",
  "ghdp claude --help",
]
common_errors = [
  { code="E_CMD_NOT_FOUND", when="claude executable is not available on PATH" },
]

[[commands]]
id = "claude-launch"
cli = "ghdp claude-launch [--profile <name>] [--choose-profile] [-- <claude args>...]"
category = "tools"
tags = ["claude", "launch", "aws", "profile"]
summary = "Launch Claude Code with GHDP AWS profile resolution for this session only."
flags = [
  { cli="--profile", type="string", required=false, default="(resolved)", help="AWS profile override for this Claude launch only" },
  { cli="--choose-profile", type="bool", required=false, default=false, help="Prompt to choose a different AWS profile for this Claude launch" },
]
examples = [
  "ghdp claude-launch",
  "ghdp claude-launch --profile aws-mcp",
  "ghdp claude-launch --choose-profile -- --help",
]
common_errors = [
  { code="E_CMD_NOT_FOUND", when="claude executable is not available on PATH" },
]

[[commands]]
id = "usage"
cli = "ghdp usage"
category = "observability"
tags = ["logs", "telemetry"]
summary = "Show recent local usage history from ~/.ghdp/usage.log."
flags = [
  { cli="--limit/-n", type="int", required=false, default=20, help="How many recent entries to show from local usage history" },
]
examples = [
  "ghdp usage",
  "ghdp usage -n 50",
]
common_errors = [
  { code="E_USAGE_LOG_READ", when="usage.log cannot be read (permissions/corruption)" },
]

[[commands]]
id = "commands"
cli = "ghdp commands"
category = "discoverability"
tags = ["help", "metadata"]
summary = "List commands with category, tags, description, and release-1 access annotations (supports filtering)."
flags = [
  { cli="--category/-c", type="string", required=false, default="", help="Filter by category (e.g., terraform, tools)" },
  { cli="--tag/-t", type="string", required=false, default="", help="Filter by tag prefix (e.g., tf, tools, aws)" },
  { cli="--format", type="string", required=false, default="table", allowed=["table","json"], help="Output format" },
]
examples = [
  "ghdp commands",
  "ghdp commands -c tools",
  "ghdp commands -t tf",
  "ghdp commands --format json",
]
common_errors = []

[[commands]]
id = "doctor"
cli = "ghdp doctor"
category = "diagnostics"
tags = ["diagnostics", "env"]
summary = "Run environment diagnostics (python/git/brew/winget/gh, etc.)."
flags = [
  { cli="--fix-winget", type="bool", required=false, default=false, help="(Windows) attempt minimal winget fix guidance/steps" },
]
examples = [
  "ghdp doctor",
  "ghdp doctor --fix-winget",
]
common_errors = [
  { code="E_FEATURE_DISABLED", when="features.doctor.enabled is false (feature_flag blocks)" },
]

# ───────────────── Config commands ─────────────────

[[commands]]
id = "config:list"
cli = "ghdp config list"
category = "config"
tags = ["config"]
summary = "Show merged config (defaults + user overrides)."
flags = []
examples = ["ghdp config list"]
common_errors = []

[[commands]]
id = "config:telemetry"
cli = "ghdp config telemetry --on|--off"
category = "config"
tags = ["config", "telemetry"]
summary = "Enable/disable local telemetry logging."
flags = [
  { cli="--on/--off", type="bool", required=true, default="(required)", help="Toggle telemetry.enabled" },
]
examples = [
  "ghdp config telemetry --off",
  "ghdp config telemetry --on",
]
common_errors = []

[[commands]]
id = "config:precommit"
cli = "ghdp config precommit --mode <off|warn|enforce>"
category = "config"
tags = ["config", "precommit"]
summary = "Set pre-commit behaviour used by precommit_check decorator. In phase 0, `off` requires `config.admin_write` directly or through a valid token."
flags = [
  { cli="--mode/-m", type="string", required=true, allowed=["off","warn","enforce"], help="precommit.mode" },
]
examples = [
  "ghdp config precommit --mode warn",
  "ghdp config precommit --mode enforce",
]
common_errors = [
  { code="E_ACCESS_DENIED", when="setting `precommit.mode=off` without admin capability" },
  { code="E_ACTOR_IDENTITY_REQUIRED", when="privileged config writes run without a resolved GitHub identity" },
]

[[commands]]
id = "config:updates"
cli = "ghdp config updates --on|--off"
category = "config"
tags = ["config", "updates", "version"]
summary = "Enable/disable GHDP update checks on startup."
flags = [
  { cli="--on/--off", type="bool", required=true, default="(required)", help="Toggle updates.enabled" },
]
examples = [
  "ghdp config updates --off",
  "ghdp config updates --on",
]
common_errors = []

[[commands]]
id = "config:claude-athena-workgroup"
cli = "ghdp config claude-athena-workgroup [--value <workgroup> | --clear]"
category = "config"
tags = ["config", "claude", "athena"]
summary = "Show, set, or clear the saved Claude Athena workgroup used by Claude bootstrap."
flags = [
  { cli="--value", type="string", required=false, default="", help="Persist this Athena workgroup for Claude bootstrap" },
  { cli="--clear", type="bool", required=false, default=false, help="Clear the saved Claude Athena workgroup from GHDP config" },
]
examples = [
  "ghdp config claude-athena-workgroup",
  "ghdp config claude-athena-workgroup --value team-athena-workgroup",
  "ghdp config claude-athena-workgroup --clear",
]
common_errors = [
  { code="E_CONFIG_CLAUDE_ATHENA_WORKGROUP_CONFLICT", when="both --value and --clear are provided" },
  { code="E_CLAUDE_ATHENA_WORKGROUP_INVALID", when="the provided Athena workgroup is blank" },
]

[[commands]]
id = "config:jenkins-okta-email"
cli = "ghdp config jenkins-okta-email --email <user@guardanthealth.com>"
category = "config"
tags = ["config", "jenkins", "okta"]
summary = "Store the Okta email GHDP should use for Jenkins MCP calls."
flags = [
  { cli="--email", type="string", required=true, help="Okta email address used for Jenkins MCP requests" },
]
examples = [
  "ghdp config jenkins-okta-email --email user@guardanthealth.com",
]
common_errors = []

[[commands]]
id = "config:git-strict-clean"
cli = "ghdp config git-strict-clean --enabled|--disabled"
category = "config"
tags = ["config", "git"]
summary = "Enable/disable clean-git enforcement for commands that use requires_clean_git. This contributor/internal surface is admin-only and prerelease-only in release 1."
flags = [
  { cli="--enabled/--disabled", type="bool", required=true, help="git.strict_clean" },
]
examples = [
  "ghdp config git-strict-clean --disabled",
  "ghdp config git-strict-clean --enabled",
]
common_errors = [
  { code="E_ACCESS_DENIED", when="running this contributor/internal config command without `platform.internal`" },
  { code="E_RELEASE_CHANNEL_BLOCKED", when="running this contributor/internal config command from a stable build" },
]

[[commands]]
id = "config:branch-jira-check"
cli = "ghdp config branch-jira-check --mode <warn|enforce>"
category = "config"
tags = ["config", "branch", "jira"]
summary = "Control Jira validation mode for branch creation. This contributor/internal surface is admin-only and prerelease-only in release 1."
flags = [
  { cli="--mode", type="string", required=true, allowed=["warn","enforce"], help="branch.create.jira_check_mode" },
]
examples = [
  "ghdp config branch-jira-check --mode warn",
  "ghdp config branch-jira-check --mode enforce",
]
common_errors = [
  { code="E_ACCESS_DENIED", when="running this contributor/internal config command without `platform.internal`" },
  { code="E_RELEASE_CHANNEL_BLOCKED", when="running this contributor/internal config command from a stable build" },
]

[[commands]]
id = "config:branch-ai-provider"
cli = "ghdp config branch-ai-provider --provider <auto|codex|claude|manual>"
category = "config"
tags = ["config", "branch", "ai"]
summary = "Control which provider GHDP prefers for branch intent generation. This contributor/internal surface is admin-only and prerelease-only in release 1."
flags = [
  { cli="--provider", type="string", required=true, allowed=["auto","codex","claude","manual"], help="branch.ai.provider" },
]
examples = [
  "ghdp config branch-ai-provider --provider auto",
  "ghdp config branch-ai-provider --provider codex",
]
common_errors = [
  { code="E_ACCESS_DENIED", when="running this contributor/internal config command without `platform.internal`" },
  { code="E_RELEASE_CHANNEL_BLOCKED", when="running this contributor/internal config command from a stable build" },
]

[[commands]]
id = "config:branch-intent"
cli = "ghdp config branch-intent --enabled|--disabled"
category = "config"
tags = ["config", "branch", "intent"]
summary = "Enable or disable branch intent generation. This contributor/internal surface is admin-only and prerelease-only in release 1."
flags = [
  { cli="--enabled/--disabled", type="bool", required=true, help="branch.intent.enabled" },
]
examples = [
  "ghdp config branch-intent --enabled",
  "ghdp config branch-intent --disabled",
]
common_errors = [
  { code="E_ACCESS_DENIED", when="running this contributor/internal config command without `platform.internal`" },
  { code="E_RELEASE_CHANNEL_BLOCKED", when="running this contributor/internal config command from a stable build" },
]

[[commands]]
id = "config:branch-intent-prompt"
cli = "ghdp config branch-intent-prompt --enabled|--disabled"
category = "config"
tags = ["config", "branch", "intent"]
summary = "Enable or disable manual prompting when no AI provider is available. This contributor/internal surface is admin-only and prerelease-only in release 1."
flags = [
  { cli="--enabled/--disabled", type="bool", required=true, help="branch.intent.prompt_if_no_ai" },
]
examples = [
  "ghdp config branch-intent-prompt --enabled",
  "ghdp config branch-intent-prompt --disabled",
]
common_errors = [
  { code="E_ACCESS_DENIED", when="running this contributor/internal config command without `platform.internal`" },
  { code="E_RELEASE_CHANNEL_BLOCKED", when="running this contributor/internal config command from a stable build" },
]

[[commands]]
id = "config:jenkins-okta-email"
cli = "ghdp config jenkins-okta-email --email <email>"
category = "config"
tags = ["config", "jenkins", "okta"]
summary = "Store the Okta email GHDP should use for Jenkins release execution."
flags = [
  { cli="--email", type="string", required=true, default="(required)", help="Okta email to store in local GHDP config" },
]
examples = [
  "ghdp config jenkins-okta-email --email mshyam@guardanthealth.com",
]
common_errors = []

[[commands]]
id = "config:jenkins-api-token"
cli = "ghdp config jenkins-api-token --token <token> | --clear"
category = "config"
tags = ["config", "jenkins", "token", "secret"]
summary = "Store, clear, or prompt for the Jenkins API token used by Jenkins release flows."
flags = [
  { cli="--token", type="string", required=false, default="", help="Store token in local GHDP config; prompts if omitted in interactive mode" },
  { cli="--clear", type="bool", required=false, default=false, help="Remove the stored Jenkins API token from local GHDP config" },
]
examples = [
  "ghdp config jenkins-api-token --token <token>",
  "ghdp config jenkins-api-token --clear",
]
common_errors = [
  { code="E_CONFIG_TOKEN_CONFLICT", when="--token and --clear are both provided" },
]

# ───────────────── Version change command ─────────────────

[[commands]]
id = "version:change"
cli = "ghdp version change"
category = "self"
tags = ["version", "upgrade", "downgrade"]
summary = "Install a selected GHDP version or converge to the latest stable release."
flags = [
  { cli="--version", type="string", required=false, default="", help="Target version tag (e.g., v0.1.0 or 0.1.0)." },
  { cli="--latest-stable", type="bool", required=false, default=false, help="Resolve the latest stable release and install it if the current version differs." },
  { cli="--method", type="string", required=false, default="auto", allowed=["auto", "pipx", "installer"], help="Install method selection" },
  { cli="--repo", type="string", required=false, default="", help="Override GitHub repo (owner/name)" },
]
examples = [
  "ghdp version change",
  "ghdp version change --latest-stable",
  "ghdp --non-interactive version change --latest-stable --method auto",
  "ghdp version change --version v0.1.0",
  "ghdp version change --version 0.1.0 --method installer",
]
common_errors = [
  { code="E_BAD_ARGS", when="non-interactive mode is used without --version or --latest-stable" },
  { code="E_NO_STABLE_RELEASE", when="the latest stable release cannot be resolved from the configured repo" },
  { code="E_PIPX_NOT_FOUND", when="--method pipx selected but pipx is unavailable" },
]

# ───────────────── AWS commands (local helper flows) ─────────────────

[[commands]]
id = "aws:sso"
cli = "ghdp aws sso"
category = "aws"
tags = ["aws", "sso", "setup"]
summary = "Configure AWS SSO session setup for a resolved or explicit profile."
flags = [
  { cli="--profile", type="string", required=false, default="(resolved)", help="AWS profile name (override)" },
  { cli="--sso-session-name", type="string", required=false, default="", help="AWS SSO session name" },
  { cli="--sso-start-url", type="string", required=false, default="", help="AWS SSO start URL" },
  { cli="--sso-region", type="string", required=false, default="", help="AWS SSO region" },
  { cli="--default-region", type="string", required=false, default="us-west-2", help="Default AWS region" },
  { cli="--default-output", type="string", required=false, default="json", help="Default output format" },
]
examples = [
  "ghdp aws sso",
  "ghdp aws sso --profile platform-dev",
  "ghdp aws sso --profile platform-dev --default-region us-west-2",
]
common_errors = [
  { code="E_AWSCLI_NOT_DISCOVERABLE", when="aws cli is installed but not available in current shell session" },
]

[[commands]]
id = "aws:login"
cli = "ghdp aws login"
category = "aws"
tags = ["aws", "sso", "auth"]
summary = "Log in to AWS SSO for a resolved or explicit profile."
flags = [
  { cli="--profile", type="string", required=false, default="(resolved)", help="AWS profile to use (override)" },
]
examples = [
  "ghdp aws login",
  "ghdp aws login --profile platform-dev",
]
common_errors = [
  { code="E_AWS_LOGIN_FAILED", when="aws sso login fails" },
]

[[commands]]
id = "aws:status"
cli = "ghdp aws status"
category = "aws"
tags = ["aws", "status", "profile", "token"]
summary = "Show resolved profile, SSO config status, and token state."
flags = [
  { cli="--profile", type="string", required=false, default="(resolved)", help="AWS profile to use (override)" },
]
examples = [
  "ghdp aws status",
  "ghdp aws status --profile platform-dev",
]
common_errors = [
  { code="E_AWS_NOT_LOGGED_IN", when="SSO session expired or missing credentials" },
]

[[commands]]
id = "aws:profile:list"
cli = "ghdp aws profile list"
category = "aws"
tags = ["aws", "profile"]
summary = "List configured profiles from ~/.aws/config and ~/.aws/credentials and mark active selections."
flags = []
examples = ["ghdp aws profile list"]
common_errors = []

[[commands]]
id = "aws:profile:use"
cli = "ghdp aws profile use --profile <name> [--scope global|repo]"
category = "aws"
tags = ["aws", "profile"]
summary = "Set active AWS profile in global or repo scope."
flags = [
  { cli="--profile", type="string", required=true, help="Profile to activate" },
  { cli="--scope", type="string", required=false, default="global", allowed=["global", "repo"], help="Profile scope" },
]
examples = [
  "ghdp aws profile use --profile aws-mcp",
  "ghdp aws profile use --profile aws-mcp --scope repo",
]
common_errors = []

[[commands]]
id = "aws:profile:current"
cli = "ghdp aws profile current [--profile <name>]"
category = "aws"
tags = ["aws", "profile"]
summary = "Show effective AWS profile and resolution source."
flags = [
  { cli="--profile", type="string", required=false, default="(none)", help="Optional one-off override to inspect" },
]
examples = ["ghdp aws profile current"]
common_errors = []

[[commands]]
id = "aws:token:status"
cli = "ghdp aws token status [--profile <name>]"
category = "aws"
tags = ["aws", "token"]
summary = "Check AWS SSO token state (valid/invalid) for a profile."
flags = [
  { cli="--profile", type="string", required=false, default="(resolved)", help="Profile override" },
]
examples = [
  "ghdp aws token status",
  "ghdp aws token status --profile aws-mcp",
]
common_errors = []

[[commands]]
id = "aws:token:refresh"
cli = "ghdp aws token refresh [--profile <name>] [--if-expired]"
category = "aws"
tags = ["aws", "token"]
summary = "Refresh AWS SSO token for a profile."
flags = [
  { cli="--profile", type="string", required=false, default="(resolved)", help="Profile override" },
  { cli="--if-expired", type="bool", required=false, default=false, help="Only refresh when token is invalid" },
]
examples = [
  "ghdp aws token refresh",
  "ghdp aws token refresh --if-expired",
]
common_errors = []

# ───────────────── Tools commands (team tool bootstrap) ─────────────────

[[commands]]
id = "tools:validate"
cli = "ghdp tools validate [--team <name>]"
category = "tools"
tags = ["tools", "manifests"]
summary = "Validate the team-toolset + tool-registry manifests."
flags = [
  { cli="--team", type="string", required=false, default="(effective team when omitted)", help="Team name from the resolved toolset source" },
]
examples = [
  "ghdp tools validate",
  "ghdp tools validate --team data-engg",
]
common_errors = [
  { code="E_MANIFEST_INVALID", when="schema/fields invalid or required tool missing from registry" },
]

[[commands]]
id = "tools:list"
cli = "ghdp tools list [--team <name>]"
category = "tools"
tags = ["tools", "list"]
summary = "List tools available for a team from the resolved team-toolset source."
flags = [
  { cli="--team", type="string", required=false, default="(effective team when omitted)", help="Team name from the resolved toolset source" },
]
examples = [
  "ghdp tools list",
  "ghdp tools list --team platform-engg",
]
common_errors = []

[[commands]]
id = "tools:status"
cli = "ghdp tools status [--team <name>] [--refresh]"
category = "tools"
tags = ["tools", "detect"]
summary = "Detect tools and record versions/ownership in ~/.ghdp/state/state.json."
flags = [
  { cli="--team", type="string", required=false, default="(effective team when omitted)", help="Team name from the resolved toolset source" },
  { cli="--refresh", type="bool", required=false, default=false, help="Re-run detection and overwrite state values" },
]
examples = [
  "ghdp tools status",
  "ghdp tools status --refresh",
  "ghdp tools status --team data-scientist --refresh",
]
common_errors = []

[[commands]]
id = "tools:install"
cli = "ghdp tools install [--team <name>] [--tool <tool>] [--all] [--upgrade] [--dry-run] [--adopt-existing]"
category = "tools"
tags = ["tools", "install", "upgrade"]
summary = "Install/upgrade tools for a team using the registry + version policy; supports Claude Code and Codex bootstrap flows."
flags = [
  { cli="--team", type="string", required=false, default="(effective team when omitted)", help="Team name from the resolved toolset source" },
  { cli="--tool", type="string", required=false, default="(none)", help="Install only one tool" },
  { cli="--all", type="bool", required=false, default=false, help="Install all tools for this team (explicit; default when --tool is omitted)" },
  { cli="--upgrade", type="bool", required=false, default=false, help="Use upgrade cmd when available" },
  { cli="--dry-run", type="bool", required=false, default=false, help="No execution; only planned actions" },
  { cli="--adopt-existing", type="bool", required=false, default=false, help="If already installed, mark as GHDP-managed" },
]
examples = [
  "ghdp tools install",
  "ghdp tools install --upgrade",
  "ghdp tools install --tool awscli",
  "ghdp tools install --tool awscli --upgrade",
  "ghdp tools install --tool claude",
  "ghdp tools install --tool codex",
  "ghdp tools install --dry-run",
  "ghdp tools install --team data-analyst --all",
]
common_errors = [
  { code="E_VERSION_POLICY_UNMET", when="post-install/upgrade version doesn't satisfy toolset policy" },
  { code="E_TOOL_INSTALL_FAILED", when="package manager command fails (brew/winget)" },
  { code="E_CLAUDE_ATHENA_WORKGROUP_REQUIRED", when="Claude install is running non-interactively and Athena workgroup is not yet configured" },
