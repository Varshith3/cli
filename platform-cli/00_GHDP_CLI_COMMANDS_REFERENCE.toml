[[commands]]
id = "release:feature-to-dev"
cli = "ghdp release feature-to-dev [--branch <feature/...>] [--repo <repo|owner/repo>] [--no-deploy-on-sqa] [--refresh-jenkins-contract] [--yes]"
category = "release"
tags = ["release", "jenkins", "pull-request"]
summary = "Trigger the Jenkins feature-to-dev flow with smart defaults, a repo-local Jenkins contract derived from Jenkinsfile, direct Jenkins API execution by default, a live status presenter during long waits, and a GitHub CLI PR lookup when Jenkins returns only a build URL. This flow is admin-only through `release.manage`."
flags = [
  { cli="--branch", type="string", required=false, default="(current feature branch when available)", help="Feature branch to promote" },
  { cli="--repo", type="string", required=false, default="(resolved from local repo)", help="Repo name or owner/repo override" },
  { cli="--deploy-on-sqa/--no-deploy-on-sqa", type="bool", required=false, default=false, help="Local GHDP feature-to-dev always uses false; passing --deploy-on-sqa is rejected" },
  { cli="--refresh-jenkins-contract", type="bool", required=false, default=false, help="Refresh the repo-local Jenkins contract from Jenkinsfile before running" },
  { cli="--yes/--confirm", type="bool", required=false, default=false, help="Skip final confirmation prompt" },
]
examples = [
  "ghdp release feature-to-dev",
  "ghdp release feature-to-dev --branch feature/EPPE-7239-TECHNICAL-jenkins-release-management-direct-skill-api",
]
common_errors = [
  { code="E_ACCESS_DENIED", when="running release feature-to-dev without `release.manage`" },
  { code="E_RELEASE_BRANCH_INVALID", when="branch is not a feature branch" },
  { code="E_RELEASE_DEPLOY_ON_SQA_UNSUPPORTED", when="local feature-to-dev is invoked with --deploy-on-sqa" },
  { code="E_RELEASE_GITHUB_TOKEN_MISSING", when="GitHub token cannot be resolved for PR creation" },
  { code="E_RELEASE_JENKINS_TOKEN_INVALID", when="stored Jenkins token is rejected and the user declines or cannot refresh it" },
  { code="E_RELEASE_JENKINS_AUTH", when="Jenkins rejects the saved or provided credentials during direct feature-to-dev execution" },
  { code="E_RELEASE_JENKINS_TLS", when="the direct Jenkins API connection fails TLS verification; set GHDP_JENKINS_CA_BUNDLE to a PEM bundle containing the Jenkins issuer if needed" },
  { code="E_RELEASE_JENKINS_UNREACHABLE", when="GHDP cannot reach Jenkins over the direct HTTPS API" },
]

