cli = "ghdp release make-release [--repo <repo|owner/repo>] [--release-type <major|minor|bugfix>] [--parent <KEY>Summary>] [--param KEY=VALUE] [--refresh-jenkins-contract] [--yes]"
category = "release"
tags = ["release", "jenkins", "main"]
summary = "Trigger the Jenkins make-release flow with a repo-local Jenkins contract, direct Jenkins API execution by default, and interactive prompts for repo-specific parameters. This flow is admin-only through `release.manage`."
flags = [
  { cli="--repo", type="string", required=false, default="(resolved from local repo)", help="Repo name or owner/repo override" },
  { cli="--release-type", type="string", required=false, default="minor", allowed=["major","minor","bugfix"], help="Release type" },
  { cli="--parent", type="string", required=false, default="(prompted or blank)", help="Parent release ticket in KEY>Summary format" },
  { cli="--param", type="string[]", required=false, default=[], help="Extra Jenkins params as KEY=VALUE; may be repeated" },
  { cli="--tested-ok-on-uat/--not-tested-ok-on-uat", type="bool", required=false, default=false, help="Forward TESTED_OK_ON_UAT to Jenkins params" },
  { cli="--merge-pr/--no-merge-pr", type="bool", required=false, default=true, help="Forward MERGE_PR to Jenkins params" },
  { cli="--tag-release/--no-tag-release", type="bool", required=false, default=true, help="Forward TAG_RELEASE to Jenkins params" },
  { cli="--deploy/--no-deploy", type="bool", required=false, default=false, help="Forward DEPLOY to Jenkins params" },
  { cli="--refresh-jenkins-contract", type="bool", required=false, default=false, help="Refresh the repo-local Jenkins contract from Jenkinsfile before running" },
  { cli="--yes/--confirm", type="bool", required=false, default=false, help="Skip final confirmation prompt" },
]
examples = [
  "ghdp release make-release",
  "ghdp release make-release --release-type bugfix --param TARGET_WORKSPACE=dev",
]
common_errors = [
  { code="E_RELEASE_TYPE_INVALID", when="release type is not major, minor, or bugfix" },
  { code="E_RELEASE_PARAM_INVALID", when="an extra Jenkins parameter is not formatted as KEY=VALUE" },
  { code="E_RELEASE_JENKINS_TOKEN_INVALID", when="stored Jenkins token is rejected and the user declines or cannot refresh it" },
  { code="E_RELEASE_JENKINS_AUTH", when="Jenkins rejects the saved or provided credentials during direct make-release execution" },
  { code="E_RELEASE_JENKINS_TLS", when="the direct Jenkins API connection fails TLS verification; set GHDP_JENKINS_CA_BUNDLE to a PEM bundle containing the Jenkins issuer if needed" },
  { code="E_RELEASE_JENKINS_UNREACHABLE", when="GHDP cannot reach Jenkins over the direct HTTPS API" },
]

