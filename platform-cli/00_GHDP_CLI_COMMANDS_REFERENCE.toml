[[commands]]
id = "create-branch"
cli = "ghdp create-branch [<ticket-type-slug>] [--type <TECHNICAL|ENHANCEMENT|BUGFIX>] [--ticket <KEY>] [--slug <slug>] [--base <branch>] [--repo <owner/name>] [--validate-jira|--no-validate-jira] [--comment-on-jira|--no-comment-on-jira] [--intent-mode <auto|generate|provided|skip>]"
category = "git"
tags = ["git", "github", "branch", "jira", "intent"]
summary = "Create a remote feature branch on GitHub, validate Jira, and optionally persist or commit repo-local branch intent. In release 1 this command is admin-only through `branch.create`."
flags = [
  { cli="branch", type="arg", required=false, default="(optional shorthand)", help="Optional shorthand like feature/EPPE-6654-ENHANCEMENT-branch-orchestration or EPPE-6654-ENHANCEMENT-branch-orchestration" },
  { cli="--type", type="string", required=false, allowed=["TECHNICAL","ENHANCEMENT","BUGFIX"], help="Branch type" },
  { cli="--ticket", type="string", required=false, help="Jira key like EPPE-6654" },
  { cli="--slug", type="string", required=false, help="User-owned branch slug" },
  { cli="--base", type="string", required=false, default="(repo default branch)", help="Base branch" },
  { cli="--repo", type="string", required=false, default="(resolved from local repo)", help="Optional owner/repo override" },
  { cli="--validate-jira", type="bool", required=false, default="(config-driven when omitted)", help="Enforce Jira validation for this run" },
  { cli="--no-validate-jira", type="bool", required=false, default="(config-driven when omitted)", help="Skip Jira validation for this run" },
  { cli="--comment-on-jira", type="bool", required=false, default=false, help="Post a Jira comment after branch creation" },
  { cli="--no-comment-on-jira", type="bool", required=false, default=false, help="Disable Jira commenting for this run" },
  { cli="--intent-mode", type="string", required=false, default="auto", allowed=["auto","generate","provided","skip"], help="Intent handling mode" },
  { cli="--intent-text", type="string", required=false, help="Inline intent text when intent-mode=provided" },
  { cli="--intent-file", type="path", required=false, help="File containing intent text when intent-mode=provided" },
  { cli="--provider", type="string", required=false, default="auto", allowed=["auto","manual","codex","claude"], help="Intent generation provider when GHDP generates intent" },
  { cli="--request-id", type="string", required=false, help="Optional workflow/request correlation id" },
  { cli="--local-checkout/--no-local-checkout", type="bool", required=false, default=true, help="Control post-create local checkout when safe" },
  { cli="--persist-intent/--no-persist-intent", type="bool", required=false, default=true, help="Control repo-local intent persistence" },
  { cli="--commit-intent/--no-commit-intent", type="bool", required=false, default=false, help="Commit and push .ghdp/frbr/intent.json after persistence" },
  { cli="--dry-run", type="bool", required=false, default=false, help="Resolve branch plan and prompt without creating the branch" },
  { cli="--github-output", type="path", required=false, help="Write workflow-safe outputs to a GitHub Actions output file" },
  { cli="--intent-prompt-file", type="path", required=false, help="Write the rendered AI intent prompt to a file" },
]
examples = [
  "ghdp create-branch EPPE-6654-ENHANCEMENT-branch-orchestration",
  "ghdp create-branch --ticket EPPE-6654 --type ENHANCEMENT --slug branch-orchestration",
  "ghdp create-branch --ticket EPPE-6654 --type TECHNICAL --slug sync-refactor --base develop",
  "ghdp create-branch --ticket EPPE-7087 --type TECHNICAL --slug cli-release-management-integration --intent-mode skip --dry-run",
  "ghdp create-branch --ticket EPPE-7087 --type TECHNICAL --slug cli-release-management-integration --intent-mode provided --intent-file intent.txt --commit-intent",
]
common_errors = [
  { code="E_ACCESS_DENIED", when="running create-branch without `branch.create`" },
  { code="E_BRANCH_FORMAT_INVALID", when="shorthand branch format is invalid" },
  { code="E_BRANCH_TYPE_INVALID", when="branch type is not TECHNICAL, ENHANCEMENT, or BUGFIX" },
  { code="E_GH_NOT_AUTHENTICATED", when="GitHub CLI is not authenticated" },
  { code="E_BRANCH_INTENT_MODE_INVALID", when="intent mode is not one of auto, generate, provided, or skip" },
  { code="E_BRANCH_INTENT_TEXT_MISSING", when="intent-mode provided is used without intent text" },
]

