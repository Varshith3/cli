[[commands]]
id = "deploy"
cli = "ghdp deploy --env <env> [--stack <name>] [--commit-id <hash>] [--plan-only] [--refresh-deps] [--target <resource>] [--yes]"
category = "data-product"
tags = ["data-product", "deploy", "infra", "terraform"]
summary = "Deploy infrastructure stacks from infra.json. In release 1 this end-user local lifecycle surface is blocked only when team policy removes `local.lifecycle`, such as for `data_analyst`."
flags = [
  { cli="--env/-e", type="string", required=true, help="Environment to deploy (dev, qa, prod)" },
  { cli="--stack/-s", type="string", required=false, default="(all stacks when omitted)", help="Stack name/ID from infra.json" },
  { cli="--commit-id/-c", type="string", required=false, default="(current HEAD)", help="Git commit hash to deploy" },
  { cli="--plan-only", type="bool", required=false, default=false, help="Only run terraform plan (do not apply)" },
  { cli="--refresh-deps", type="bool", required=false, default=false, help="Delete and reclone terraform dependencies" },
  { cli="--target/-t", type="string[]", required=false, default=[], help="Terraform target(s) to deploy; may be repeated" },
  { cli="--yes/--auto-approve", type="bool", required=false, default=false, help="Skip confirmation and auto-approve apply" },
]
examples = [
  "ghdp deploy --env dev --plan-only",
  "ghdp deploy --env qa --stack networking",
]
common_errors = [
  { code="E_ACCESS_DENIED", when="running deploy without `local.lifecycle` in the current team context" },
  { code="E_STRUCTURE_INVALID", when="No apps.json or infra.json found" },
  { code="E_STACK_NOT_FOUND", when="Stack name not found in infra.json" },
  { code="E_INVALID_ENV", when="Environment is not dev/qa/prod" },
  { code="E_DEPLOY_FAILED", when="one or more stacks fail to deploy" },
]
