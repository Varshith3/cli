# ───────────────── Error model (high-level) ─────────────────
[errors]
primary = "PlatformError(code, reason, alert) with Rich panel output. Tracked commands write usage + error logs."
logs = "errors.log contains structured errors; usage.log contains command usage (ok/error + metadata)."

[mcp_future]
note = "This TOML is intentionally machine-readable so an MCP server or IDE agent can map intents -> CLI invocations."

[[commands]]
id = "sync:list"
cli = "ghdp sync list [--capability <id>] [--repo-root <path>]"
category = "sync"
tags = ["sync", "content", "list"]
summary = "List known sync capabilities from content-index.json and local scan/state data. Defaults can be redirected for validation via GHDP_SYNC_INDEX_REPO, GHDP_SYNC_INDEX_TAG, and GHDP_SYNC_INDEX_ASSET."
flags = [
  { cli="--capability", type="string", required=false, default="", help="Limit results to one capability id" },
  { cli="--repo-root", type="path", required=false, default="(global scope when omitted)", help="Scope sync operations to a repository root for repo-local capabilities" },
]
examples = [
  "ghdp sync list",
  "ghdp sync list --capability codex-skills-aws",
]
common_errors = [
  { code="E_RELEASE_CONTENT_INDEX_INVALID", when="content-index.json is malformed" },
  { code="E_RELEASE_CONTENT_DOWNLOAD_FAILED", when="content-index.json cannot be fetched" },
  { code="E_SYNC_PROVIDER_UNSUPPORTED", when="a capability uses a provider GHDP does not yet support" },
  { code="E_SYNC_TARGET_UNSUPPORTED", when="a capability uses a local target type GHDP does not yet support" },
]

[[commands]]
id = "sync:scan"
cli = "ghdp sync scan [--capability <id>] [--repo-root <path>]"
category = "sync"
tags = ["sync", "content", "scan"]
summary = "Scan known local capability locations and record tracked plus extra local files. Defaults can be redirected for validation via GHDP_SYNC_INDEX_REPO, GHDP_SYNC_INDEX_TAG, and GHDP_SYNC_INDEX_ASSET."
flags = [
  { cli="--capability", type="string", required=false, default="", help="Limit results to one capability id" },
  { cli="--repo-root", type="path", required=false, default="(global scope when omitted)", help="Scope sync operations to a repository root for repo-local capabilities" },
]
examples = [
  "ghdp sync scan",
  "ghdp sync scan --capability codex-skills-aws",
]
common_errors = [
  { code="E_RELEASE_CONTENT_INDEX_INVALID", when="content-index.json is malformed" },
  { code="E_RELEASE_CONTENT_MANIFEST_INVALID", when="content-manifest.json is malformed" },
  { code="E_SYNC_PROVIDER_UNSUPPORTED", when="a capability uses a provider GHDP does not yet support" },
  { code="E_SYNC_TARGET_UNSUPPORTED", when="a capability uses a local target type GHDP does not yet support" },
]

[[commands]]
id = "sync:check"
cli = "ghdp sync check [--capability <id>] [--repo-root <path>]"
category = "sync"
tags = ["sync", "content", "check"]
summary = "Check scanned sync capabilities for bootstrap, repair, update, or blocked recovery needs. Defaults can be redirected for validation via GHDP_SYNC_INDEX_REPO, GHDP_SYNC_INDEX_TAG, and GHDP_SYNC_INDEX_ASSET."
notes = "Shared-root capabilities are not treated as installed just because unrelated files already exist in the same root. When capability metadata includes a recovery hint, blocked entries can surface a `next step:` recommendation such as `ghdp tableau init`."
flags = [
  { cli="--capability", type="string", required=false, default="", help="Limit results to one capability id" },
  { cli="--repo-root", type="path", required=false, default="(global scope when omitted)", help="Scope sync operations to a repository root for repo-local capabilities" },
]
examples = [
  "ghdp sync check",
  "ghdp sync check --capability tableau-athena-jars",
]
common_errors = [
  { code="E_RELEASE_CONTENT_INDEX_INVALID", when="content-index.json is malformed" },
  { code="E_RELEASE_CONTENT_MANIFEST_INVALID", when="content-manifest.json is malformed" },
  { code="E_SYNC_PROVIDER_UNSUPPORTED", when="a capability uses a provider GHDP does not yet support" },
  { code="E_SYNC_TARGET_UNSUPPORTED", when="a capability uses a local target type GHDP does not yet support" },
]

[[commands]]
id = "sync:update"
cli = "ghdp sync update [--capability <id>] [--auto-approve] [--repo-root <path>]"
category = "sync"
tags = ["sync", "content", "update"]
summary = "Update only already-tracked files for installed sync capabilities. Current policy requires `sync.mutate`, which is temporarily granted to both admin and non-admin users for bootstrap recovery while sync mutation remains coarse-grained. Defaults can be redirected for validation via GHDP_SYNC_INDEX_REPO, GHDP_SYNC_INDEX_TAG, and GHDP_SYNC_INDEX_ASSET."
flags = [
  { cli="--capability", type="string", required=false, default="", help="Update only one capability id" },
  { cli="--auto-approve/--yes", type="bool", required=false, default=false, help="Apply update without confirmation" },
  { cli="--repo-root", type="path", required=false, default="(global scope when omitted)", help="Scope sync operations to a repository root for repo-local capabilities" },
]
examples = [
  "ghdp sync update",
  "ghdp sync update --capability codex-skills-aws --auto-approve",
]
common_errors = [
  { code="E_ACCESS_DENIED", when="running sync update without `sync.mutate`" },
  { code="E_ACTOR_IDENTITY_REQUIRED", when="sync update needs a resolved actor identity but GitHub login is not resolved" },
  { code="E_SYNC_CONFIRM_REQUIRED", when="running non-interactive without --auto-approve" },
  { code="E_SYNC_UPDATE_BLOCKED", when="latest manifest drops tracked local files" },
  { code="E_SYNC_TARGET_UNSUPPORTED", when="a capability uses a local target type GHDP does not yet support" },
]

[[commands]]
id = "sync:repair"
cli = "ghdp sync repair [--capability <id>] [--auto-approve] [--repo-root <path>]"
category = "sync"
tags = ["sync", "content", "repair"]
summary = "Repair missing tracked files for installed sync capabilities from the recorded version, or bootstrap-install a missing capability when the content index explicitly allows install-if-missing. Current policy requires `sync.mutate`, which is temporarily granted to both admin and non-admin users for bootstrap recovery while sync mutation remains coarse-grained. Defaults can be redirected for validation via GHDP_SYNC_INDEX_REPO, GHDP_SYNC_INDEX_TAG, and GHDP_SYNC_INDEX_ASSET."
notes = "Unrelated files already present in a shared install root do not make that capability repairable by themselves; GHDP now requires tracked files or durable recorded install state before it enters a repair path."
flags = [
  { cli="--capability", type="string", required=false, default="", help="Repair only one capability id" },
  { cli="--auto-approve/--yes", type="bool", required=false, default=false, help="Apply repair without confirmation" },
  { cli="--repo-root", type="path", required=false, default="(global scope when omitted)", help="Scope sync operations to a repository root for repo-local capabilities" },
]
examples = [
  "ghdp sync repair",
  "ghdp sync repair --capability claude-skills-aws --auto-approve",
]
common_errors = [
  { code="E_ACCESS_DENIED", when="running sync repair without `sync.mutate`" },
  { code="E_ACTOR_IDENTITY_REQUIRED", when="sync repair needs a resolved actor identity but GitHub login is not resolved" },
  { code="E_SYNC_CONFIRM_REQUIRED", when="running non-interactive without --auto-approve" },
  { code="E_SYNC_REPAIR_FAILED", when="repair cannot rebuild the tracked files from recorded state" },
  { code="E_SYNC_BOOTSTRAP_NOT_ALLOWED", when="the capability is missing locally and its content-index entry does not allow install-if-missing" },
  { code="E_SYNC_ROOT_KEY_UNRESOLVABLE", when="bootstrap install is allowed but the capability target root cannot be resolved for the current scope" },
  { code="E_SYNC_TARGET_UNSUPPORTED", when="a capability uses a local target type GHDP does not yet support" },
]

[[commands]]
id = "sync:run"
cli = "ghdp sync run [--capability <id>] [--auto-approve] [--repo-root <path>]"
category = "sync"
tags = ["sync", "content", "run"]
summary = "Run scan, bootstrap/repair, and update through one shared reconciliation flow. Current policy requires `sync.mutate`, which is temporarily granted to both admin and non-admin users for bootstrap recovery while sync mutation remains coarse-grained. Defaults can be redirected for validation via GHDP_SYNC_INDEX_REPO, GHDP_SYNC_INDEX_TAG, and GHDP_SYNC_INDEX_ASSET."
notes = "Bootstrap installs are previewed and reported separately from repairs. If a run has only blocked capabilities, GHDP ends with a blocked summary instead of `No sync actions needed`, and may surface capability-owned recovery guidance such as `ghdp tableau init` when the content index provides it."
flags = [
  { cli="--capability", type="string", required=false, default="", help="Limit results to one capability id" },
  { cli="--auto-approve/--yes", type="bool", required=false, default=false, help="Apply repairs and updates without confirmation" },
  { cli="--repo-root", type="path", required=false, default="(global scope when omitted)", help="Scope sync operations to a repository root for repo-local capabilities" },
]
examples = [
  "ghdp sync run",
  "ghdp sync run --capability tableau-athena-jars --auto-approve",
]
common_errors = [
  { code="E_ACCESS_DENIED", when="running sync run without `sync.mutate`" },
  { code="E_ACTOR_IDENTITY_REQUIRED", when="sync run needs a resolved actor identity but GitHub login is not resolved" },
  { code="E_SYNC_CONFIRM_REQUIRED", when="running non-interactive without --auto-approve" },
  { code="E_SYNC_UPDATE_BLOCKED", when="latest manifest drops tracked local files" },
  { code="E_SYNC_REPAIR_FAILED", when="repair cannot rebuild the tracked files from recorded state" },
  { code="E_SYNC_BOOTSTRAP_NOT_ALLOWED", when="the capability is missing locally and its content-index entry does not allow install-if-missing" },
  { code="E_SYNC_ROOT_KEY_UNRESOLVABLE", when="bootstrap install is allowed but the capability target root cannot be resolved for the current scope" },
  { code="E_SYNC_TARGET_UNSUPPORTED", when="a capability uses a local target type GHDP does not yet support" },
]

