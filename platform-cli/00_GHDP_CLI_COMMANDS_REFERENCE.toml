# ───────────────── Data-Product Repo Operations ─────────────────

[[commands]]
id = "release:plan-binaries"
cli = "ghdp release plan-binaries [--source-ref <ref>] [--workdir <path>] [--install-flavor <standard|managed>] [--version-override <tag>] [--release-visibility <auto|draft|published>] [--release-channel <auto|prerelease|ga>] [--python-version <version>]"
category = "release"
tags = ["release", "binaries", "plan"]
summary = "Compute the portable manual binary-release plan GHDP will use for the current repo and executor. This command is admin-only through `release.manage`."
flags = [
  { cli="--source-ref", type="string", required=false, default="(current branch)", help="Branch, tag, or SHA to build from" },
  { cli="--workdir", type="path", required=false, default="auto-detect", help="Override the auto-detected release workdir for non-standard layouts" },
  { cli="--install-flavor", type="string", required=false, default="standard", allowed=["standard","managed"], help="Install flavor for the direct GHDP release flow" },
  { cli="--version-override", type="string", required=false, default="", help="Optional release tag override for stable branches only, for example v0.2.3" },
  { cli="--release-visibility", type="string", required=false, default="auto", allowed=["auto","draft","published"], help="Resolve release draft behavior" },
  { cli="--release-channel", type="string", required=false, default="auto", allowed=["auto","prerelease","ga"], help="Resolve prerelease vs GA behavior" },
  { cli="--python-version", type="string", required=false, default="(current python)", help="Python version for release metadata and CI parity (3.10+)" },
]
examples = [
  "ghdp release plan-binaries",
  "ghdp release plan-binaries --source-ref feature/EPPE-7087-TECHNICAL-cli-release-management-integration --workdir platform-cli",
  "ghdp release plan-binaries --source-ref develop --version-override v0.2.3",
]
common_errors = [
  { code="E_ACCESS_DENIED", when="running release plan-binaries without `release.manage`" },
  { code="E_RELEASE_SOURCE_REF_MISSING", when="GHDP cannot resolve the current branch or an explicit --source-ref was not usable" },
  { code="E_RELEASE_STABLE_TAGS_MISSING", when="the repo has no published stable semver releases to increment from" },
  { code="E_RELEASE_PLATFORM_UNSUPPORTED", when="the current executor platform is not mapped to a binary asset target" },
]

[[commands]]
id = "release:prepare-binaries-release"
cli = "ghdp release prepare-binaries-release [--source-ref <ref>] [--workdir <path>] [--install-flavor <standard|managed>] [--version-override <tag>] [--release-visibility <auto|draft|published>] [--release-channel <auto|prerelease|ga>] [--python-version <version>]"
category = "release"
tags = ["release", "binaries", "prepare"]
summary = "Validate release-note freshness, generate release notes, and create or update the GitHub release before building assets. This command is admin-only through `release.manage`, with a narrow CI bypass for the GitHub Actions binary-build workflow."
flags = [
  { cli="--source-ref", type="string", required=false, default="(current branch)", help="Branch, tag, or SHA to build from" },
  { cli="--workdir", type="path", required=false, default="auto-detect", help="Override the auto-detected release workdir for non-standard layouts" },
  { cli="--install-flavor", type="string", required=false, default="standard", allowed=["standard","managed"], help="Install flavor for the direct GHDP release flow" },
  { cli="--version-override", type="string", required=false, default="", help="Optional release tag override for stable branches only, for example v0.2.3" },
  { cli="--release-visibility", type="string", required=false, default="auto", allowed=["auto","draft","published"], help="Resolve release draft behavior" },
  { cli="--release-channel", type="string", required=false, default="auto", allowed=["auto","prerelease","ga"], help="Resolve prerelease vs GA behavior" },
  { cli="--python-version", type="string", required=false, default="(current python)", help="Python version for release metadata and CI parity (3.10+)" },
]
examples = [
  "ghdp release prepare-binaries-release --source-ref develop",
  "ghdp release prepare-binaries-release --source-ref develop --workdir platform-cli",
  "ghdp release prepare-binaries-release --source-ref develop --version-override v0.2.3",
]
common_errors = [
  { code="E_ACCESS_DENIED", when="running release prepare-binaries-release without `release.manage` outside the allowed CI executor path" },
  { code="E_GH_NOT_AUTHENTICATED", when="gh is not authenticated and GH_TOKEN is not available" },
  { code="E_RELEASE_NOTES_STALE", when="feature-branch release notes were not updated recently enough" },
  { code="E_RELEASE_STABLE_EXISTS", when="a stable release tag already exists and GHDP refuses to mutate it" },
]

[[commands]]
id = "release:build-binaries"
cli = "ghdp release build-binaries [--source-ref <ref>] [--workdir <path>] [--install-flavor <standard|managed>] [--version-override <tag>] [--release-visibility <auto|draft|published>] [--release-channel <auto|prerelease|ga>] [--python-version <version>] [--ensure-release/--skip-ensure-release]"
category = "release"
tags = ["release", "binaries", "build"]
summary = "Build the current-platform GHDP binary, generate checksum metadata, and upload the assets to the resolved GitHub release. This command is admin-only through `release.manage`, with a narrow CI bypass for the GitHub Actions binary-build workflow."
flags = [
  { cli="--source-ref", type="string", required=false, default="(current branch)", help="Branch, tag, or SHA to build from" },
  { cli="--workdir", type="path", required=false, default="auto-detect", help="Override the auto-detected release workdir for non-standard layouts" },
  { cli="--install-flavor", type="string", required=false, default="standard", allowed=["standard","managed"], help="Install flavor for the direct GHDP release flow" },
  { cli="--version-override", type="string", required=false, default="", help="Optional release tag override for stable branches only, for example v0.2.3" },
  { cli="--release-visibility", type="string", required=false, default="auto", allowed=["auto","draft","published"], help="Resolve release draft behavior" },
  { cli="--release-channel", type="string", required=false, default="auto", allowed=["auto","prerelease","ga"], help="Resolve prerelease vs GA behavior" },
  { cli="--python-version", type="string", required=false, default="(current python)", help="Python version for release metadata and CI parity (3.10+)" },
  { cli="--ensure-release/--skip-ensure-release", type="bool", required=false, default=true, help="Ensure the GitHub release exists before building and uploading assets" },
]
examples = [
  "ghdp release build-binaries --source-ref develop",
  "ghdp release build-binaries --source-ref feature/EPPE-7087-TECHNICAL-cli-release-management-integration --skip-ensure-release",
  "ghdp release build-binaries --source-ref develop --version-override v0.2.3",
]
common_errors = [
  { code="E_ACCESS_DENIED", when="running release build-binaries without `release.manage` outside the allowed CI executor path" },
  { code="E_RELEASE_ARTIFACT_MISSING", when="PyInstaller output could not be found for the current platform target" },
  { code="E_RELEASE_PLATFORM_UNSUPPORTED", when="the current executor platform is not mapped to a binary asset target" },
  { code="E_GH_NOT_AUTHENTICATED", when="gh is not authenticated and GH_TOKEN is not available" },
]

