  { code="E_ACTOR_IDENTITY_REQUIRED", when="token minting runs without a resolved GitHub identity" },
  { code="E_ADMIN_TOKEN_SCOPE_REQUIRED", when="neither --for-user nor --team is supplied" },
  { code="E_ADMIN_SIGNER_MISSING", when="admin-local signer material has not been provisioned yet" },
  { code="E_ADMIN_TOKEN_CAPABILITY_INVALID", when="requested token capability is not allowlisted by policy" },
  { code="E_ADMIN_TOKEN_TTL_INVALID", when="requested TTL exceeds policy limits" },
]

